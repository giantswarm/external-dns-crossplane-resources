{{- if eq .Values.provider "aws" }}
apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  name: {{ include "resourceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  providerConfigRef:
    name: {{ .Values.clusterName }}
  forProvider:
    tags:
      giantswarm.io/cluster: {{ .Values.clusterName }}
      managed-by: {{ include "name" . | quote }}
      sigs.k8s.io/cluster-api-provider-aws/cluster/{{ .Values.clusterName }}: owned
    assumeRolePolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {{- $oidcDomains := include "oidcDomains" . | fromJsonArray -}}
          {{- range $index, $oidcDomain := $oidcDomains -}}
          {{- if not (eq $index 0) }}, {{ end }}{
            "Effect": "Allow",
            "Principal": {
              "Federated": "arn:{{ include "awsPartition" $ }}:iam::{{ include "accountID" $ }}:oidc-provider/{{ $oidcDomain }}"
            },
            "Action": "sts:AssumeRoleWithWebIdentity",
            "Condition": {
              "StringLike": {
                "{{ $oidcDomain }}:sub": "system:serviceaccount:{{ $.Values.serviceAccount.namespace }}:{{ $.Values.serviceAccount.name }}"
              }
            }
          }
          {{- end }}
        ]
      }
    inlinePolicy:
      - name: {{ .Values.serviceAccount.name }}-policy
        policy: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Action": "route53:ChangeResourceRecordSets",
                "Resource": [
                  "arn:{{ include "awsPartition" $ }}:route53:::hostedzone/*"
                ],
                "Effect": "Allow"
              },
              {
                "Action": [
                  "route53:ListHostedZones",
                  "route53:ListResourceRecordSets",
                  "route53:ListTagsForResource"
                ],
                "Resource": "*",
                "Effect": "Allow"
              }
            ]
          }
{{- end }}
