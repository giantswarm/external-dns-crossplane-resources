# This chart was initially only used by the aws provider and did not contain any provider selection.
# Defaulting to `aws` safeguards against resources being removed due to missing new configuration.
provider: aws

# Values are inlined by cluster-aws in the HelmRelease spec
clusterName: ""

serviceAccount:
  name: external-dns
  namespace: kube-system

aws:
  accountID: ""
  awsPartition: ""
  oidcDomain: ""
  oidcDomains: []

accountID: ""
awsPartition: ""
oidcDomain: ""
oidcDomains: []

azure:
  location: ""
  resourceGroupName: ""
  subscriptionID: ""
  mountPath: /etc/kubernetes
